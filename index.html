<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <h2>My To-Do List</h2>
        <div class="controls">
            <span id="task-count" aria-live="polite">0</span> tasks
        </div>
        <div class="input-section">
            <input type="text" id="task-input" placeholder="Add a new task..." maxlength="100" aria-label="New task" autofocus>
            <button id="add-btn" type="button" title="Add task">Add</button>
        </div>
        <p id="empty-msg" class="muted">No tasks yet. Add one above.</p>
        <ul id="task-list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
